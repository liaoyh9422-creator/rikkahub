name: Build arm64-v8a Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-arm64-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.8.0 --activate
          pnpm --version

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh ninja-build

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platforms;android-37.0" \
            "build-tools;35.0.0" \
            "ndk;28.2.13676358" \
            "cmake;3.22.1"

      - name: Prepare release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"

          echo "$KEYSTORE_BASE64" | base64 -d > app/release-key.jks

          cat > local.properties <<EOF
          storeFile=release-key.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Make build config CI-friendly
        run: |
          # Local phone build needs this override for ARM aapt2.
          # GitHub Actions runs on x86_64 Linux, so let AGP use the normal Maven/SDK aapt2.
          sed -i '/android.aapt2FromMavenOverride/d' gradle.properties
          sed -i '/org.gradle.java.installations.paths/d' gradle.properties
          sed -i '/org.gradle.java.installations.auto-download/d' gradle.properties
          sed -i '/systemProp.https.protocols/d' gradle.properties
          sed -i '/systemProp.jdk.tls.client.protocols/d' gradle.properties
          sed -i '/systemProp.java.net.preferIPv4Stack/d' gradle.properties
          sed -i '/systemProp.http.keepAlive/d' gradle.properties
          sed -i 's/ -Dhttps.protocols=TLSv1.2,TLSv1.3//g' gradle.properties
          sed -i 's/ -Djdk.tls.client.protocols=TLSv1.2,TLSv1.3//g' gradle.properties
          sed -i 's/ -Djava.net.preferIPv4Stack=true//g' gradle.properties
          sed -i 's/ -Dhttp.keepAlive=false//g' gradle.properties
          rm -f gradle/gradle-daemon-jvm.properties

      - name: Build release arm64-v8a APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          GRADLE_USER_HOME: ~/.gradle
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-arm64-v8a-release-apk
          path: app/build/outputs/apk/release/*arm64-v8a*release*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Manual build #{0}', github.run_number) }}
          target_commitish: ${{ github.sha }}
          files: app/build/outputs/apk/release/*arm64-v8a*release*.apk
          fail_on_unmatched_files: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
